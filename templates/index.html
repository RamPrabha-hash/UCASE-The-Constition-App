<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCASE | Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>UCASE</h2>

        <button class="new-chat" onclick="newChat()">+ New Chat</button>

        <div class="sidebar-note">
            Indian Constitution based AI
        </div>

        <a href="/logout" class="logout">Logout</a>
    </div>
    

    <!-- CHAT AREA -->
    <div class="chat-section">
        <div id="chat" class="chat-box"></div>

       <div class="input-box">
            <input type="text" id="userInput" placeholder="Describe your legal issue...">
            <button onclick="sendMessage()">Send</button>
            <button id="micBtn" onclick="toggleRecording()" style="background:none;border:none;font-size:1.5em;cursor:pointer;">🎤</button>
            <span id="recStatus" style="color: red; font-size: 0.8em; display: none;">Recording...</span>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
